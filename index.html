<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>入庫チェック</title>
<style>
  :root{
    --green:#4a9b3e; --green-d:#3d7d34;
    --teal:#1a5e72; --purple:#7a2d6e;
    --ink:#0e0e0e; --line:#cfcfcf;
    --warn:#d6322e; --bg:#f4f5f3;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    background:var(--bg); color:var(--ink); padding:10px; font-size:16px;
  }
  .app{
    max-width:560px;margin:0 auto;background:#fff;
    border:3px solid var(--green);border-radius:14px;overflow:hidden;
  }
  header{
    background:var(--ink);color:#fff;text-align:center;font-weight:800;
    font-size:26px;letter-spacing:.5px;padding:14px 8px;
  }
  header .u{text-decoration:underline;text-decoration-color:var(--green);text-decoration-thickness:3px;}

  /* ---- メインタブ（機能切替）---- */
  .maintabs{display:flex;border-bottom:3px solid var(--teal);}
  .maintab{
    flex:1;text-align:center;padding:14px 8px;font-weight:800;font-size:17px;
    background:#eef0ee;color:#666;cursor:pointer;border:none;
  }
  .maintab.active{background:var(--teal);color:#fff;}

  .page{display:none;padding:16px 14px;}
  .page.active{display:block;}

  /* ---- 上段：パレット計算 ---- */
  .calc-list{list-style:none;margin:0;padding:0;}
  .calc-row{
    display:flex;align-items:center;gap:6px;margin-bottom:8px;
  }
  .row-no{
    width:26px;flex:0 0 auto;text-align:center;font-weight:800;
    font-size:14px;color:var(--teal);
  }
  .numbox{
    width:0;flex:1 1 0;min-width:0;text-align:center;font-size:18px;font-weight:700;
    padding:11px 4px;border-radius:9px;border:2px solid var(--purple);outline:none;
  }
  .numbox::placeholder{color:#c2c2c2;font-size:13px;font-weight:400;}
  .op{font-size:18px;font-weight:700;flex:0 0 auto;}
  .sub{
    flex:0 0 auto;min-width:72px;text-align:right;font-size:16px;font-weight:800;white-space:nowrap;
  }
  .sub b{color:var(--green-d);}
  .grand{
    margin-top:14px;padding:14px;border-top:3px solid var(--teal);
    display:flex;justify-content:space-between;align-items:center;
    font-size:20px;font-weight:800;
  }
  .grand .total{font-size:28px;color:var(--teal);}

  /* ---- ASIN：パレットサブタブ ---- */
  .subtabs-wrap{margin-bottom:12px;}
  .subtabs{display:flex;flex-wrap:wrap;gap:6px;}
  .subtab{
    flex:0 0 auto;min-width:42px;padding:8px 11px;
    border:2px solid var(--teal);background:#fff;color:var(--teal);
    border-radius:8px;font-weight:700;font-size:15px;cursor:pointer;position:relative;
  }
  .subtab.active{background:var(--teal);color:#fff;}
  .subtab .dot{
    position:absolute;top:-4px;right:-4px;width:12px;height:12px;border-radius:50%;
    background:var(--warn);display:none;border:2px solid #fff;
  }
  .subtab.haswarn .dot{display:block;}
  .tab-add{
    padding:8px 12px;border:2px dashed var(--green);background:#fff;color:var(--green);
    font-weight:800;border-radius:8px;cursor:pointer;font-size:16px;
  }
  .tab-add:disabled{opacity:.35;cursor:default;}

  .pallet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
  .pallet-name{font-weight:800;font-size:17px;color:var(--teal);}
  .summary{font-size:15px;font-weight:700;}
  .summary .cnt{color:var(--green-d);}

  .scan-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
  .scan-input{
    flex:1;padding:14px;font-size:18px;border:2px solid var(--green);border-radius:10px;outline:none;
    font-family:"SFMono-Regular",Consolas,Menlo,monospace;
  }
  .scan-input:focus{border-color:var(--green-d);box-shadow:0 0 0 3px rgba(74,155,62,.2);}

  .codelist{list-style:none;margin:0;padding:0;}
  .codeitem{
    display:flex;align-items:center;gap:10px;padding:12px;border:2px solid var(--line);
    border-radius:10px;margin-bottom:8px;background:#fafafa;
  }
  .codeitem.warn{border-color:var(--warn);background:#fdeceb;}
  .code-text{flex:1;font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:17px;font-weight:700;word-break:break-all;}
  .qty{font-size:20px;font-weight:800;white-space:nowrap;}
  .qty .n{color:var(--teal);min-width:1.5em;display:inline-block;text-align:right;}
  .del{border:none;background:#ddd;color:#555;border-radius:8px;width:34px;height:34px;font-size:18px;font-weight:800;cursor:pointer;line-height:1;flex:0 0 auto;}
  .empty{color:#999;text-align:center;padding:18px;font-size:15px;}

  .warn-banner{
    background:var(--warn);color:#fff;font-weight:800;padding:12px;border-radius:10px;
    margin-bottom:12px;font-size:16px;display:none;
  }
  .warn-banner.show{display:block;}

  .footer{padding:0 14px 16px;}
  .reset{
    width:100%;padding:16px;font-size:20px;font-weight:800;background:#fff;color:var(--warn);
    border:3px solid var(--warn);border-radius:12px;cursor:pointer;
  }
  .reset:active{background:var(--warn);color:#fff;}
  .hint{font-size:12px;color:#888;text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div class="app">
  <header>入庫チェック</header>

  <!-- メインタブ -->
  <div class="maintabs">
    <button class="maintab active" id="mt-calc">パレット計算</button>
    <button class="maintab" id="mt-asin">ASIN チェック</button>
  </div>

  <!-- ページ1：パレット計算 -->
  <div class="page active" id="page-calc">
    <ul class="calc-list" id="calcList"></ul>
    <div class="grand">
      <span>総合計</span>
      <span><span class="total" id="grandTotal">0</span> unit</span>
    </div>
  </div>

  <!-- ページ2：ASINチェック -->
  <div class="page" id="page-asin">
    <div class="subtabs-wrap"><div class="subtabs" id="subtabs"></div></div>

    <div class="warn-banner" id="warnBanner">⚠ 混入の可能性：複数種類のコードが読み込まれています</div>

    <div class="pallet-head">
      <span class="pallet-name" id="palletName">パレット 1</span>
      <span class="summary">種類 <span class="cnt" id="kindCount">0</span> / 合計 <span class="cnt" id="sumCount">0</span> 個</span>
    </div>

    <div class="scan-row">
      <input class="scan-input" id="scanInput" placeholder="ASIN / JAN をスキャン" autocomplete="off" autocapitalize="off">
    </div>

    <ul class="codelist" id="codeList"></ul>
    <div class="empty" id="emptyMsg">まだ読み込みがありません</div>
    <div class="hint">スキャン後 Enter で確定（スキャナは自動）。同じコードは個数加算、違うコードは警告表示。</div>
  </div>

  <div class="footer">
    <button class="reset" id="resetBtn">リセット</button>
  </div>
</div>

<script>
const MAX_PALLETS = 16;
let pallets = [];
let active = 0;
let currentPage = 'calc';

function newPallet(i){ return { codes:{}, order:[] }; }

function init(){
  pallets = [ newPallet(0) ];
  active = 0;
  renderSubtabs();
  renderPallet();
}

/* ---- メインタブ切替 ---- */
function showPage(name){
  currentPage = name;
  document.getElementById('mt-calc').classList.toggle('active', name==='calc');
  document.getElementById('mt-asin').classList.toggle('active', name==='asin');
  document.getElementById('page-calc').classList.toggle('active', name==='calc');
  document.getElementById('page-asin').classList.toggle('active', name==='asin');
  if(name==='asin') focusScan();
}
document.getElementById('mt-calc').onclick = ()=>showPage('calc');
document.getElementById('mt-asin').onclick = ()=>showPage('asin');

/* ---- 上段：パレット計算（複数行）---- */
const CALC_MIN_ROWS = 16;
let calcRows = []; // [{stack:'', pallets:''}]

function initCalc(){
  calcRows = [];
  for(let i=0;i<CALC_MIN_ROWS;i++) calcRows.push({stack:'',pallets:''});
  renderCalc();
}

function renderCalc(){
  const list = document.getElementById('calcList');
  list.innerHTML='';
  calcRows.forEach((r,i)=>{
    const li = document.createElement('li');
    li.className='calc-row';
    const sub = (parseInt(r.stack)||0)*(parseInt(r.pallets)||0);
    li.innerHTML =
      '<span class="row-no">'+(i+1)+'</span>'+
      '<input class="numbox cstk" type="number" inputmode="numeric" placeholder="積付け数" value="'+(r.stack)+'">'+
      '<span class="op">×</span>'+
      '<input class="numbox cpal" type="number" inputmode="numeric" placeholder="パレット数" value="'+(r.pallets)+'">'+
      '<span class="op">=</span>'+
      '<span class="sub"><b>'+sub.toLocaleString()+'</b> u</span>';
    const stk = li.querySelector('.cstk');
    const pal = li.querySelector('.cpal');
    stk.addEventListener('input', ()=>{ r.stack=stk.value; onCalcInput(i); });
    pal.addEventListener('input', ()=>{ r.pallets=pal.value; onCalcInput(i); });
    list.appendChild(li);
  });
  updateGrand();
}

function onCalcInput(i){
  // 最終行に入力が入ったら1行追加
  const last = calcRows.length-1;
  if(i===last){
    const r = calcRows[last];
    if((r.stack!=='' && r.stack!=null) || (r.pallets!=='' && r.pallets!=null)){
      calcRows.push({stack:'',pallets:''});
      // 小計と総合計だけ更新し、行追加分を再描画（フォーカスは維持しないが入力は確定済み）
      renderCalc();
      return;
    }
  }
  // 同行の小計＋総合計のみ更新（再描画せずフォーカス維持）
  const rowEls = document.querySelectorAll('#calcList .calc-row');
  const r = calcRows[i];
  const sub = (parseInt(r.stack)||0)*(parseInt(r.pallets)||0);
  if(rowEls[i]) rowEls[i].querySelector('.sub b').textContent = sub.toLocaleString();
  updateGrand();
}

function updateGrand(){
  const total = calcRows.reduce((a,r)=> a + (parseInt(r.stack)||0)*(parseInt(r.pallets)||0), 0);
  document.getElementById('grandTotal').textContent = total.toLocaleString();
}

/* ---- パレットサブタブ ---- */
function palletHasWarn(p){ return p.order.length > 1; }

function renderSubtabs(){
  const wrap = document.getElementById('subtabs');
  wrap.innerHTML='';
  pallets.forEach((p,i)=>{
    const t = document.createElement('div');
    t.className='subtab'+(i===active?' active':'')+(palletHasWarn(p)?' haswarn':'');
    t.innerHTML = (i+1) + '<span class="dot"></span>';
    t.onclick = ()=>{ active=i; renderSubtabs(); renderPallet(); focusScan(); };
    wrap.appendChild(t);
  });
  if(pallets.length < MAX_PALLETS){
    const add = document.createElement('button');
    add.className='tab-add'; add.textContent='＋'; add.title='パレット追加';
    add.onclick = ()=>{
      pallets.push(newPallet(pallets.length));
      active = pallets.length-1;
      renderSubtabs(); renderPallet(); focusScan();
    };
    wrap.appendChild(add);
  }
}

/* ---- パレット描画 ---- */
function renderPallet(){
  const p = pallets[active];
  document.getElementById('palletName').textContent = 'パレット '+(active+1);

  const list = document.getElementById('codeList');
  list.innerHTML='';
  document.getElementById('emptyMsg').style.display = p.order.length? 'none':'block';

  p.order.forEach(code=>{
    const li = document.createElement('li');
    const isWarn = p.order.length>1 && code !== p.order[0];
    li.className='codeitem'+(isWarn?' warn':'');
    li.innerHTML =
      '<span class="code-text">'+ (isWarn?'⚠ ':'') + escapeHtml(code) +'</span>'+
      '<span class="qty">× <span class="n">'+p.codes[code]+'</span> 個</span>'+
      '<button class="del" title="削除">✕</button>';
    li.querySelector('.del').onclick = ()=>{ removeCode(code); };
    list.appendChild(li);
  });

  const kinds = p.order.length;
  const sum = p.order.reduce((a,c)=>a+p.codes[c],0);
  document.getElementById('kindCount').textContent = kinds;
  document.getElementById('sumCount').textContent = sum;
  document.getElementById('warnBanner').classList.toggle('show', palletHasWarn(p));
}

function addCode(raw){
  const code = raw.trim();
  if(!code) return;
  const p = pallets[active];
  if(p.codes[code]!=null){ p.codes[code]++; }
  else { p.codes[code]=1; p.order.push(code); }
  renderSubtabs(); renderPallet();
}
function removeCode(code){
  const p = pallets[active];
  delete p.codes[code];
  p.order = p.order.filter(c=>c!==code);
  renderSubtabs(); renderPallet();
}

/* ---- スキャン入力 ---- */
const scan = document.getElementById('scanInput');
scan.addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); addCode(scan.value); scan.value=''; }
});
function focusScan(){ if(currentPage==='asin') setTimeout(()=>scan.focus(), 30); }

/* ---- リセット（共通）---- */
document.getElementById('resetBtn').onclick = ()=>{
  if(confirm('すべての入力をリセットしますか？')){
    initCalc();
    init();
    focusScan();
  }
};

function escapeHtml(s){
  return s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

init();
initCalc();
</script>
</body>
</html>
